name: Go SDK CI
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ["atlasexec", "sdk"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
      - name: Run Go linters
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ matrix.module }}
          args: --verbose --timeout 15m

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod
      # The atlasexec module tests invoke the atlas binary and exercise many Pro-only
      # flags/features not present in this community fork. Only run the sdk module tests
      # which test pure Go SDK behaviour without spawning the binary.
      - name: Run tests
        run: go test -race ./...
        working-directory: sdk
